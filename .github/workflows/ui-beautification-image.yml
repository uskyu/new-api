name: Build UI Beautification Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: false
        default: newapi_ui_001
  push:
    branches:
      - ui-beautification-version
      - newapi_ui_001

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/new-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/new-api:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
